<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Artikel - Integrasi API</title>
  <!-- Boxicons untuk Icon -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    /* --- CSS UTAMA & MODAL STYLE --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f4f6f9; color: #333; padding: 20px; transition: background 0.3s; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Stats Section */
    .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; }
    .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .stat-info h3 { font-size: 20px; margin-bottom: 2px; }
    .stat-info p { font-size: 12px; color: #777; }
    
    /* Grid Artikel */
    .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .card-img { width: 100%; height: 180px; object-fit: cover; background: #e0e0e0; }
    .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-tag { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; width: fit-content; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #777; margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; }
    .featured-badge { position: absolute; top: 10px; right: 10px; background: #ff9800; color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; }

    /* Skeleton Loading */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sk-card { height: 300px; border-radius: 12px; }

    /* Modal Overlay */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 999; padding: 15px; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-content { background: #fff; width: 100%; max-width: 700px; max-height: 90vh; border-radius: 16px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header-img { width: 100%; height: 280px; object-fit: cover; background: #e0e0e0; }
    .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.8); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); z-index: 10; transition: background 0.2s; }
    .modal-close:hover { background: #fff; }
    .modal-body { padding: 25px; }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; font-size: 13px; color: #666; margin-bottom: 15px; }
    .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; line-height: 1.3; }
    .modal-desc { font-size: 15px; line-height: 1.6; color: #444; margin-bottom: 20px; white-space: normal; }
    
    /* Button Style */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #007bff; color: #fff; }
    .btn:hover { background: #0056b3; }
    .btn-success { background: #28a745 !important; }
  </style>
</head>
<body>

  <div class="container">
    <!-- SEKSI STATISTIK -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-icon" style="background:#e3f2fd; color:#0d6efd;"><i class='bx bx-news'></i></div>
        <div class="stat-info"><h3 id="s-total">0</h3><p>Total Artikel</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fff3e0; color:#ff9800;"><i class='bx bx-star'></i></div>
        <div class="stat-info"><h3 id="s-featured">0</h3><p>Artikel Pilihan</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8f5e9; color:#2e7d32;"><i class='bx bx-show'></i></div>
        <div class="stat-info"><h3 id="s-views">0</h3><p>Total Tayangan</p></div>
      </div>
    </div>

    <!-- AREA GRID ARTIKEL -->
    <div class="article-grid" id="grid-container">
      <!-- Skeleton Loading awal sebelum API terisi -->
    </div>
  </div>

  <!-- MODAL DETAIL ARTIKEL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal(null)"><i class='bx bx-x'></i></button>
      <img id="modal-img" class="modal-header-img" src="" alt="Gambar Artikel">
      <div class="modal-body">
        <div class="modal-meta">
          <span id="modal-kat" class="card-tag">Kategori</span>
          <span id="modal-featured" class="featured-badge" style="position:static;"><i class='bx bx-star'></i> Pilihan</span>
          <span><i class='bx bx-calendar'></i> <span id="m-date-text">-</span></span>
          <span><i class='bx bx-show'></i> <span id="m-views-text">0</span> Tayangan</span>
        </div>
        <h2 id="modal-title" class="modal-title">Judul Artikel</h2>
        <div id="modal-desc" class="modal-desc">Deskripsi konten...</div>
        <button id="modal-copy-btn" class="btn" onclick="copyContent()"><i class='bx bx-copy'></i> Salin Konten</button>
      </div>
    </div>
  </div>

  <script>
    // Penampung Data Global Utama
    let DB = { kategori: [], artikel: [] };

    // Cadangan Data Lokal jika API kamu belum siap/gagal di-fetch
    const DUMMY_DATA = {
      kategori: [
        { id: "k1", nama: "Teknologi", warna: "#007bff" },
        { id: "k2", nama: "Kesehatan", warna: "#28a745" }
      ],
      artikel: [
        { id: "a1", kategori_id: "k1", judul: "Belajar Integrasi API di GitHub", deskripsi: "Panduan lengkap merombak local storage menjadi API berbasis serverless.", gambar: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500", tanggal: "2026-05-23", featured: true, views: 120 },
        { id: "a2", kategori_id: "k2", judul: "Tips Menjaga Kesehatan Mata", deskripsi: "Kurangi screen time dan gunakan pencahayaan yang ideal saat bekerja.", gambar: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=500", tanggal: "2026-05-22", featured: false, views: 45 }
      ]
    };

    // Saat Web Dibuka, langsung muat data
    document.addEventListener("DOMContentLoaded", loadData);

    // --- 1. MEMUAT DATA DARI API SERVERSIDE ---
    async function loadData() {
      showSkeleton();
      try {
        // Memanggil API milikmu untuk mengambil data database
        const res = await fetch('/api/get-data');
        if (!res.ok) throw new Error('API tidak merespon dengan baik');
        DB = await res.json();
      } catch (e) {
        console.warn("Menggunakan data dummy karena /api/get-data belum aktif:", e.message);
        DB = DUMMY_DATA;
      }
      
      // Beri sedikit jeda visual, lalu render datanya ke layar
      setTimeout(render, 400);
    }

    // --- 2. LOGIKA INTERAKSI & PENGIRIMAN DATA KE API ---
    async function openModal(id) {
      const a = DB.artikel.find(x => x.id === id);
      if (!a) return;

      // [Optimistic UI] Langsung tambahkan view di layar client agar terasa instant
      a.views = (a.views || 0) + 1;
      
      const cardViewEl = document.getElementById(`view-card-${id}`);
      if(cardViewEl) cardViewEl.innerHTML = `<i class='bx bx-show'></i> ${a.views}`;
      
      // Update juga total ringkasan views di bagian atas website
      const totalViews = DB.artikel.reduce((sum, item) => sum + (item.views || 0), 0);
      document.getElementById('s-views').textContent = totalViews;

      // Panggil API viewed.js di latar belakang untuk menyimpan data permanen ke Database
      try {
        await fetch('/api/viewed.js', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ article_id: id })
        });
      } catch (error) {
        console.error("Gagal memperbarui total views ke server:", error);
      }

      // Tampilkan data artikel terpilih ke dalam Modal Box
      const k = getKat(a.kategori_id);
      document.getElementById('modal-img').src = a.gambar;
      
      const katEl = document.getElementById('modal-kat');
      katEl.textContent = k.nama;
      katEl.style.background = k.warna + '20';
      katEl.style.color = k.warna;

      document.getElementById('m-date-text').textContent = fmtDate(a.tanggal);
      document.getElementById('m-views-text').textContent = a.views;
      document.getElementById('modal-featured').style.display = a.featured ? 'inline-flex' : 'none';
      document.getElementById('modal-title').textContent = a.judul;
      document.getElementById('modal-desc').innerHTML = esc(a.deskripsi).replace(/\n/g, '<br>');

      // Reset tombol copy ke keadaan semula
      const btn = document.getElementById('modal-copy-btn');
      btn.innerHTML = "<i class='bx bx-copy'></i> Salin Konten";
      btn.classList.remove('btn-success');

      // Buka modal
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    // --- 3. PROSES STRUKTURISASI RENDER LAYAR ---
    function render() {
      const grid = document.getElementById('grid-container');
      grid.innerHTML = '';

      if (!DB.artikel || DB.artikel.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#999; padding:40px;">Belum ada artikel tersedia.</p>`;
        return;
      }

      // Susun dan Tampilkan semua card artikel
      DB.artikel.forEach(a => {
        const k = getKat(a.kategori_id);
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openModal(a.id);

        card.innerHTML = `
          ${a.featured ? `<div class="featured-badge"><i class='bx bx-star'></i> Pilihan</div>` : ''}
          <img class="card-img" src="${a.gambar}" alt="Gambar" loading="lazy">
          <div class="card-body">
            <span class="card-tag" style="background:${k.warna}20; color:${k.warna};">${k.nama}</span>
            <h3 class="card-title">${esc(a.judul)}</h3>
            <div class="card-footer">
              <span><i class='bx bx-calendar'></i> ${fmtDate(a.tanggal)}</span>
              <span id="view-card-${a.id}"><i class='bx bx-show'></i> ${a.views || 0}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      // Update Angka Statistik Atas
      document.getElementById('s-total').textContent = DB.artikel.length;
      document.getElementById('s-featured').textContent = DB.artikel.filter(x => x.featured).length;
      document.getElementById('s-views').textContent = DB.artikel.reduce((sum, item) => sum + (item.views || 0), 0);
    }

    // --- FUNGSI PEMBANTU (HELPERS) ---
    function showSkeleton() {
      const grid = document.getElementById('grid-container');
      grid.innerHTML = Array(3).fill('<div class="skeleton sk-card"></div>').join('');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    }

    function getKat(id) {
      return DB.kategori.find(x => x.id === id) || { nama: "Umum", warna: "#6c757d" };
    }

    function fmtDate(dStr) {
      if (!dStr) return '-';
      const o = new Date(dStr);
      return isNaN(o) ? dStr : o.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function copyContent() {
      const title = document.getElementById('modal-title').textContent;
      const desc = document.getElementById('modal-desc').innerText;
      const fullText = `${title}\n\n${desc}`;

      navigator.clipboard.writeText(fullText).then(() => {
        const btn = document.getElementById('modal-copy-btn');
        btn.innerHTML = "<i class='bx bx-check'></i> Berhasil Disalin!";
        btn.classList.add('btn-success');
      }).catch(err => console.error('Gagal menyalin text: ', err));
    }
  </script>
</body>
</html>
