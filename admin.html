<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}

/* ── COLOR PALETTE & VARIABLES ── */
:root {
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --primary-dark: #1d4ed8;
  --accent: #f97316;
  --success: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --sidebar-w: 260px;
  --header-h: 70px;
  --radius: 12px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  
  /* Light Theme */
  --bg: #f3f4f6;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --ink: #0f172a;
  --ink2: #334155;
  --ink3: #64748b;
  --ink4: #94a3b8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #334155;
  --ink: #f8fafc;
  --ink2: #cbd5e1;
  --ink3: #94a3b8;
  --ink4: #64748b;
  --primary-light: #1e3a8a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
  --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.5);
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  display: flex;
  font-size: 14px;
  transition: background-color 0.3s ease, color 0.3s ease;
  overflow-x: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w); height: 100dvh; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; 
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
}
.sidebar-logo {
  height: var(--header-h); display: flex; align-items: center; gap: 12px;
  padding: 0 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #60a5fa);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(37,99,235,0.3);
}
.logo-text { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
.logo-text span { color: var(--primary); }

.sidebar-scroll { 
  flex: 1; overflow-y: auto; padding-top: 10px; padding-bottom: 20px;
}
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.sidebar-section { padding: 16px 24px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink4); }
.nav-item {
  display: flex; align-items: center;
