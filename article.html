<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artikel – Catatan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e4e7ec;
  --ink:#111827;
  --ink2:#374151;
  --ink3:#6b7280;
  --ink4:#9ca3af;
  --primary:#2563eb;
  --primary-light:#eff6ff;
  --primary-dark:#1d4ed8;
  --accent:#f97316;
  --success:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --sidebar-w:240px;
  --header-h:60px;
  --radius:10px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.08);
  --content-w:720px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;font-size:14px}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar-w);min-height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:50;transition:transform .25s;
}
.sidebar-logo{
  height:var(--header-h);display:flex;align-items:center;gap:10px;
  padding:0 20px;border-bottom:1px solid var(--border);
}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--primary)}

.sidebar-section{padding:16px 12px 8px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;
  cursor:pointer;color:var(--ink2);font-size:13px;font-weight:500;
  transition:all .18s;margin:1px 8px;text-decoration:none;
}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.sidebar-footer a{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  color:var(--ink3);font-size:12px;text-decoration:none;transition:all .18s;
}
.sidebar-footer a:hover{background:var(--bg);color:var(--ink)}

/* ── WRAPPER ── */
#wrapper{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
#topbar{
  height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:40;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:16px;font-weight:600;color:var(--ink)}
.breadcrumb{font-size:12px;color:var(--ink4);display:flex;align-items:center;gap:4px}
.breadcrumb a{color:var(--ink4);text-decoration:none}
.breadcrumb a:hover{color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:8px}

.topbar-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .18s;text-decoration:none;
}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}

/* ── MAIN ── */
#main{padding:32px 24px;flex:1;display:flex;justify-content:center}

/* ── ARTICLE WRAPPER ── */
#article-wrap{width:100%;max-width:var(--content-w);animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO IMAGE ── */
#hero-img{
  width:100%;height:380px;object-fit:cover;border-radius:16px;
  display:block;box-shadow:var(--shadow-md);margin-bottom:28px;
}
#hero-ph{
  width:100%;height:260px;background:linear-gradient(135deg,#e9edf2,#d1d8e3);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:56px;color:#b0bac9;margin-bottom:28px;
}

/* ── ARTICLE META ── */
#article-meta{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;
}
#kat-badge{padding:3px 12px;border-radius:99px;font-size:11px;font-weight:600}
#article-date{font-size:12px;color:var(--ink4)}
#feat-badge{
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;
}

/* ── ARTICLE TITLE ── */
#article-title{
  font-family:'Lora',serif;
  font-size:30px;font-weight:600;color:var(--ink);
  line-height:1.3;margin-bottom:20px;
}

/* ── DIVIDER ── */
.art-divider{
  width:48px;height:3px;background:var(--primary);border-radius:99px;
  margin-bottom:24px;
}

/* ── ARTICLE CONTENT ── */
#article-body{
  font-family:'Lora',serif;
  font-size:16px;color:var(--ink2);line-height:1.85;font-weight:400;
}
#article-body p{margin-bottom:1.2em}
#article-body h2{font-size:20px;font-weight:600;color:var(--ink);margin:1.6em 0 .7em;font-family:'Sora',sans-serif}
#article-body h3{font-size:17px;font-weight:600;color:var(--ink);margin:1.4em 0 .6em;font-family:'Sora',sans-serif}
#article-body ul,#article-body ol{padding-left:1.5em;margin-bottom:1.2em}
#article-body li{margin-bottom:.4em}
#article-body blockquote{
  border-left:3px solid var(--primary);padding:12px 18px;
  margin:1.4em 0;background:var(--primary-light);border-radius:0 8px 8px 0;
  color:var(--ink2);font-style:italic;
}
#article-body a{color:var(--primary);text-decoration:underline}
#article-body strong{font-weight:600;color:var(--ink)}
#article-body code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace}

/* deskripsi sebagai intro jika tidak ada konten */
#article-intro{
  font-family:'Lora',serif;font-size:17px;color:var(--ink2);
  line-height:1.85;font-style:italic;
  border-left:3px solid var(--primary);padding:14px 20px;
  background:var(--primary-light);border-radius:0 10px 10px 0;
  margin-bottom:20px;
}

/* ── FOOTER CARD ── */
#article-footer{
  margin-top:40px;padding:20px 24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;
}
#article-footer .footer-label{font-size:12px;color:var(--ink3)}
#back-btn{
  display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:transparent;color:var(--ink2);
  transition:all .18s;text-decoration:none;
}
#back-btn:hover{background:var(--bg);border-color:var(--primary);color:var(--primary)}

/* ── LOADING / ERROR ── */
#loading{
  text-align:center;padding:80px 20px;color:var(--ink3);
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

#error-state{
  text-align:center;padding:80px 20px;color:var(--ink3);display:none;
}
#error-state .ei{font-size:48px;margin-bottom:12px;opacity:.4}
#error-state p{margin-bottom:16px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;
  display:none;box-shadow:var(--shadow-md);animation:toastIn .25s ease;
  border-left:3px solid var(--success);
}
@keyframes toastIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
#toast.show{display:block}
#toast.err{border-left-color:var(--danger)}

/* ── MOBILE ── */
#sidebar-toggle{display:none;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--ink);padding:4px}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #wrapper{margin-left:0}
  #sidebar-toggle{display:block}
  #hero-img{height:220px}
  #article-title{font-size:22px}
  #article-body{font-size:15px}
  #main{padding:20px 16px}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Catatan<span>.</span></div>
  </div>
  <div class="sidebar-section">Menu</div>
  <a class="nav-item" href="index.html">
    <span class="nav-icon">⊞</span> Dashboard
  </a>
  <a class="nav-item" href="admin.html">
    <span class="nav-icon">⚙</span> Admin Panel
  </a>
  <a class="nav-item" href="config.html">
    <span class="nav-icon">🔧</span> Konfigurasi
  </a>
  <div class="sidebar-footer">
    <a href="config.html">🔑 &nbsp;Pengaturan Akun</a>
  </div>
</nav>
<div id="sidebar-overlay"></div>

<!-- WRAPPER -->
<div id="wrapper">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-left">
      <button id="sidebar-toggle">☰</button>
      <div>
        <div class="page-title" id="topbar-title">Artikel</div>
        <div class="breadcrumb">
          <a href="index.html">Beranda</a>
          <span>›</span>
          <span id="breadcrumb-title">Memuat…</span>
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="topbar-btn btn-ghost">← Kembali</a>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- LOADING -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Memuat artikel…</p>
    </div>

    <!-- ERROR -->
    <div id="error-state">
      <div class="ei">⚠️</div>
      <p id="error-msg">Artikel tidak ditemukan.</p>
      <a href="index.html" class="topbar-btn btn-primary" style="display:inline-flex">← Kembali ke Dashboard</a>
    </div>

    <!-- ARTICLE -->
    <div id="article-wrap" style="display:none">
      <!-- hero image -->
      <img id="hero-img" src="" alt="" style="display:none">
      <div id="hero-ph" style="display:none">📝</div>

      <!-- meta -->
      <div id="article-meta">
        <span id="kat-badge"></span>
        <span id="article-date"></span>
        <span id="feat-badge" style="display:none">⭐ Unggulan</span>
      </div>

      <!-- title -->
      <h1 id="article-title"></h1>
      <div class="art-divider"></div>

      <!-- deskripsi intro (selalu tampil) -->
      <div id="article-intro"></div>

      <!-- konten panjang (opsional, dari field `konten`) -->
      <div id="article-body"></div>

      <!-- footer -->
      <div id="article-footer">
        <span class="footer-label">Selesai membaca?</span>
        <a href="index.html" id="back-btn">← Kembali ke Dashboard</a>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ── CONFIG & CACHE ── */
const CFG_KEY  = 'ctt_config';
const DATA_KEY = 'ctt_data';

function getConfig(){
  try{ return JSON.parse(localStorage.getItem(CFG_KEY))||{} }catch(e){return{}}
}
function getCachedData(){
  try{ return JSON.parse(localStorage.getItem(DATA_KEY))||null }catch(e){return null}
}
function setCachedData(d){ localStorage.setItem(DATA_KEY, JSON.stringify(d)) }

const cfg = getConfig();
const isConfigured = cfg.owner && cfg.repo && cfg.pat && !cfg.pat.includes('XXXX');

/* ── GITHUB API ── */
function apiUrl(){
  return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'data.json'}`;
}
function apiHeaders(){
  return {
    'Authorization':'Bearer '+cfg.pat,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github+json'
  }
}
async function loadFromGitHub(){
  const r = await fetch(apiUrl(),{headers:apiHeaders()});
  if(!r.ok) throw new Error('GitHub '+r.status);
  const j = await r.json();
  const raw = atob(j.content.replace(/\n/g,''));
  const data = JSON.parse(raw);
  data._sha = j.sha;
  return data;
}

/* ── HELPERS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(s){
  if(!s) return '';
  return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}
function getKat(db,id){ return db.kategori.find(k=>k.id===id)||{nama:'—',warna:'#9ca3af'} }

/* ── GET ARTICLE ID FROM URL ── */
function getArticleId(){
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

/* ── RENDER ARTICLE ── */
function renderArticle(a, db){
  const k = getKat(db, a.kategori_id);

  // update page title & breadcrumb
  document.title = a.judul + ' – Catatan';
  document.getElementById('topbar-title').textContent = a.judul.length > 40 ? a.judul.slice(0,38)+'…' : a.judul;
  document.getElementById('breadcrumb-title').textContent = a.judul.length > 40 ? a.judul.slice(0,38)+'…' : a.judul;

  // hero image
  const imgEl = document.getElementById('hero-img');
  const phEl  = document.getElementById('hero-ph');
  if(a.gambar){
    imgEl.src = a.gambar;
    imgEl.alt = a.judul;
    imgEl.style.display = 'block';
    phEl.style.display  = 'none';
    imgEl.onerror = ()=>{ imgEl.style.display='none'; phEl.style.display='flex'; };
  } else {
    imgEl.style.display = 'none';
    phEl.style.display  = 'flex';
  }

  // meta
  const katEl = document.getElementById('kat-badge');
  katEl.textContent = k.nama;
  katEl.style.background = k.warna+'20';
  katEl.style.color = k.warna;

  document.getElementById('article-date').textContent = fmtDate(a.tanggal);

  const featEl = document.getElementById('feat-badge');
  featEl.style.display = a.featured ? 'inline-flex' : 'none';

  // title
  document.getElementById('article-title').textContent = a.judul;

  // deskripsi (selalu tampil sebagai intro)
  const introEl = document.getElementById('article-intro');
  if(a.deskripsi){
    introEl.textContent = a.deskripsi;
    introEl.style.display = 'block';
  } else {
    introEl.style.display = 'none';
  }

  // konten panjang (field `konten`, bisa HTML atau plain text)
  const bodyEl = document.getElementById('article-body');
  if(a.konten){
    // jika konten mengandung tag HTML, render langsung
    // jika plain text, convert baris baru jadi paragraf
    const looksLikeHtml = /<[a-z][\s\S]*>/i.test(a.konten);
    if(looksLikeHtml){
      bodyEl.innerHTML = a.konten;
    } else {
      // plain text: setiap baris kosong = paragraf baru
      bodyEl.innerHTML = a.konten
        .split(/\n\n+/)
        .map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`)
        .join('');
    }
  } else {
    bodyEl.innerHTML = '';
  }

  // show
  document.getElementById('loading').style.display = 'none';
  document.getElementById('article-wrap').style.display = 'block';
}

/* ── SHOW ERROR ── */
function showError(msg){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('error-msg').textContent = msg || 'Artikel tidak ditemukan.';
}

/* ── TOAST ── */
let _tt;
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(err?' err':'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── INIT ── */
async function init(){
  const articleId = getArticleId();
  if(!articleId){ showError('ID artikel tidak ditemukan di URL.'); return; }

  let DB = null;

  if(isConfigured){
    try{
      DB = await loadFromGitHub();
      setCachedData(DB);
    }catch(e){
      DB = getCachedData();
      if(DB) showToast('Gagal ambil data GitHub, pakai cache.', true);
    }
  } else {
    DB = getCachedData();
  }

  // fallback demo data
  if(!DB){
    DB = {
      kategori:[
        {id:'k1',nama:'Teknologi',warna:'#3b82f6'},
        {id:'k2',nama:'Gaya Hidup',warna:'#10b981'},
        {id:'k3',nama:'Bisnis',warna:'#f59e0b'}
      ],
      artikel:[
        {id:'a1',judul:'Membangun Kebiasaan Digital yang Sehat',deskripsi:'Panduan praktis untuk mengelola waktu layar dan menjaga keseimbangan antara dunia digital dan kehidupan nyata.',gambar:'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800&q=80',kategori_id:'k1',tanggal:'2026-05-15',featured:true,konten:'Di era digital yang semakin masif ini, kita sering lupa bahwa layar bukanlah tujuan akhir kehidupan.\n\nKebiasaan digital yang sehat dimulai dari kesadaran sederhana: kapan kita benar-benar butuh perangkat, dan kapan kita hanya tergoda olehnya.\n\nCoba mulai dengan menetapkan jam bebas layar — misalnya satu jam sebelum tidur. Otak Anda akan berterima kasih, dan kualitas tidur Anda akan meningkat drastis.\n\nSelanjutnya, matikan notifikasi yang tidak penting. Setiap ping yang tidak relevan adalah gangguan kecil yang menumpuk menjadi kelelahan besar.\n\nIngat: teknologi adalah alat. Anda yang menggunakannya, bukan sebaliknya.'},
        {id:'a2',judul:'Seni Berpikir Lambat di Era Serba Cepat',deskripsi:'Mengapa memperlambat ritme berpikir justru menghasilkan keputusan yang lebih baik dan hidup yang lebih bermakna.',gambar:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',kategori_id:'k2',tanggal:'2026-05-10',featured:false,konten:'Daniel Kahneman membagi pikiran manusia menjadi dua sistem: Sistem 1 yang cepat dan intuitif, dan Sistem 2 yang lambat dan analitis.\n\nDunia modern memuja Sistem 1 — respons instan, keputusan kilat, konten singkat. Namun keputusan terbaik dalam hidup justru lahir dari Sistem 2.\n\nBerpikir lambat bukan berarti lambat bertindak. Ia berarti memberi ruang bagi pikiran untuk mengendap sebelum melompat pada kesimpulan.\n\nPraktiknya sederhana: sebelum membalas pesan penting, tunggu 10 menit. Sebelum membuat keputusan besar, tidur semalam. Sebelum bereaksi, tarik napas dulu.'},
        {id:'a3',judul:'Modal Kecil, Ide Besar',deskripsi:'Kisah nyata para wirausaha yang memulai dari nol dan membuktikan bahwa kreativitas adalah modal utama.',gambar:'https://images.unsplash.com/photo-1664575602554-2087b04935a5?w=800&q=80',kategori_id:'k3',tanggal:'2026-05-05',featured:false,konten:'Banyak yang menunggu modal besar untuk mulai. Padahal sejarah bisnis penuh dengan cerita yang dimulai dari garasi, kamar kos, atau bahkan trotoar.\n\nModal utama seorang wirausaha bukanlah uang — melainkan keberanian untuk memulai dan ketajaman untuk melihat masalah sebagai peluang.\n\nAmbil contoh sederhana: tukang es krim keliling yang mengubah rute berdasarkan cuaca dan event lokal. Tanpa aplikasi canggih, hanya dengan observasi dan kemauan belajar.\n\nIde besar tidak selalu lahir dari ruang rapat ber-AC. Ia lahir dari kepekaan terhadap kebutuhan nyata di sekitar kita.'}
      ]
    };
  }

  const artikel = DB.artikel.find(a => a.id === articleId);
  if(!artikel){
    showError(`Artikel dengan ID "${articleId}" tidak ditemukan.`);
    return;
  }

  renderArticle(artikel, DB);
}

/* ── SIDEBAR MOBILE ── */
document.getElementById('sidebar-toggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
});
document.getElementById('sidebar-overlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});

init();
</script>
</body>
</html>
