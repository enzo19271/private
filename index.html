<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Catatan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e4e7ec;
  --ink:#111827;
  --ink2:#374151;
  --ink3:#6b7280;
  --ink4:#9ca3af;
  --primary:#2563eb;
  --primary-light:#eff6ff;
  --primary-dark:#1d4ed8;
  --accent:#f97316;
  --success:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --sidebar-w:240px;
  --header-h:60px;
  --radius:10px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.08);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;font-size:14px}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar-w);min-height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:50;transition:transform .25s;
}
.sidebar-logo{
  height:var(--header-h);display:flex;align-items:center;gap:10px;
  padding:0 20px;border-bottom:1px solid var(--border);
}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--primary)}

.sidebar-section{padding:16px 12px 8px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;
  cursor:pointer;color:var(--ink2);font-size:13px;font-weight:500;
  transition:all .18s;margin:1px 8px;text-decoration:none;
}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}

.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.sidebar-footer a{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  color:var(--ink3);font-size:12px;text-decoration:none;transition:all .18s;
}
.sidebar-footer a:hover{background:var(--bg);color:var(--ink)}

/* ── WRAPPER ── */
#wrapper{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
#topbar{
  height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:40;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:16px;font-weight:600;color:var(--ink)}
.breadcrumb{font-size:12px;color:var(--ink4);display:flex;align-items:center;gap:4px}
.topbar-right{display:flex;align-items:center;gap:8px}

.search-box{
  display:flex;align-items:center;gap:8px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;padding:7px 12px;
  transition:all .2s;
}
.search-box:focus-within{background:#fff;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-box input{border:none;background:transparent;font-family:'Sora',sans-serif;font-size:13px;color:var(--ink);outline:none;width:180px}
.search-box input::placeholder{color:var(--ink4)}

.topbar-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .18s;text-decoration:none;
}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}

/* ── MAIN ── */
#main{padding:24px;flex:1}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-info{}
.stat-val{font-size:22px;font-weight:700;color:var(--ink);line-height:1}
.stat-label{font-size:11px;color:var(--ink3);margin-top:3px;font-weight:500}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filter-chip{
  padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);
  background:var(--surface);font-family:'Sora',sans-serif;font-size:12px;
  font-weight:500;color:var(--ink2);cursor:pointer;transition:all .18s;
}
.filter-chip:hover{border-color:var(--primary);color:var(--primary)}
.filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* ── SECTION HEADER ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:15px;font-weight:600;color:var(--ink)}
.view-toggle{display:flex;gap:4px}
.vt-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink3);transition:all .18s}
.vt-btn.active,.vt-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff}

/* ── GRID ── */
#articles-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;
}
#articles-grid.list-view{grid-template-columns:1fr}

/* ── ARTICLE CARD ── */
.a-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);transition:transform .22s,box-shadow .22s;
  animation:fadeUp .35s ease both;position:relative;cursor:pointer;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.a-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.a-card:hover .a-card-title{color:var(--primary)}

.a-card-img{width:100%;height:180px;object-fit:cover;display:block;background:var(--bg)}
.a-card-img-ph{width:100%;height:180px;background:linear-gradient(135deg,#e9edf2,#d1d8e3);display:flex;align-items:center;justify-content:center;font-size:36px;color:#b0bac9}

.a-card-body{padding:14px 16px 16px}
.a-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kat-badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.03em}
.a-date{font-size:11px;color:var(--ink4);margin-left:auto}
.a-card-title{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:6px;transition:color .18s}
.a-card-desc{font-size:12px;color:var(--ink3);line-height:1.6;font-weight:300;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.featured-ribbon{position:absolute;top:10px;left:10px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.04em;pointer-events:none}

/* list view card */
#articles-grid.list-view .a-card{display:flex;flex-direction:row}
#articles-grid.list-view .a-card-img,
#articles-grid.list-view .a-card-img-ph{width:200px;height:auto;min-height:130px;flex-shrink:0}
#articles-grid.list-view .a-card-body{padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
#articles-grid.list-view .a-card-title{font-size:16px}
#articles-grid.list-view .a-card-desc{-webkit-line-clamp:2}

/* ── EMPTY ── */
#empty-state{display:none;text-align:center;padding:60px 20px;color:var(--ink3)}
#empty-state .ei{font-size:48px;margin-bottom:12px;opacity:.4}

/* ── MODAL OVERLAY ── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
  backdrop-filter:blur(4px);
}
#modal-overlay.open{opacity:1;pointer-events:all}

/* ── MODAL BOX ── */
#modal{
  background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);
  width:100%;max-width:680px;max-height:90vh;overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(20px) scale(.97);transition:transform .25s;
}
#modal-overlay.open #modal{transform:translateY(0) scale(1)}

#modal-img{
  width:100%;height:240px;object-fit:cover;display:block;flex-shrink:0;
  background:linear-gradient(135deg,#e9edf2,#d1d8e3);
}
#modal-img-ph{
  width:100%;height:180px;background:linear-gradient(135deg,#e9edf2,#d1d8e3);
  display:flex;align-items:center;justify-content:center;font-size:48px;color:#b0bac9;flex-shrink:0;
}

#modal-content{padding:24px 28px;overflow-y:auto;flex:1}

#modal-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
#modal-kat{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
#modal-date{font-size:12px;color:var(--ink4)}
#modal-featured{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}

#modal-title{
  font-family:'Lora',serif;font-size:22px;font-weight:600;
  color:var(--ink);line-height:1.35;margin-bottom:12px;
}
#modal-desc{
  font-size:14px;color:var(--ink2);line-height:1.75;font-weight:300;
}

#modal-footer{
  padding:16px 28px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-shrink:0;background:var(--surface2);
}
#modal-close-btn{
  display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:transparent;color:var(--ink2);
  transition:all .18s;
}
#modal-close-btn:hover{background:var(--bg)}
#modal-copy-btn{
  display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:var(--primary);color:#fff;transition:all .18s;
}
#modal-copy-btn:hover{background:var(--primary-dark)}
#modal-copy-btn.copied{background:var(--success)}

/* close X button */
#modal-x{
  position:absolute;top:14px;right:14px;width:32px;height:32px;
  border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:none;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s;z-index:2;
}
#modal-x:hover{background:rgba(0,0,0,.7)}
.modal-img-wrap{position:relative;flex-shrink:0}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;
  display:none;box-shadow:var(--shadow-md);animation:toastIn .25s ease;
  border-left:3px solid var(--success);
}
@keyframes toastIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
#toast.show{display:block}
#toast.err{border-left-color:var(--danger)}

/* ── MOBILE TOGGLE ── */
#sidebar-toggle{display:none;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--ink);padding:4px}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #wrapper{margin-left:0}
  #sidebar-toggle{display:block}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .search-box{display:none}
  #articles-grid.list-view .a-card{flex-direction:column}
  #articles-grid.list-view .a-card-img,
  #articles-grid.list-view .a-card-img-ph{width:100%;height:180px}
  #modal{max-height:95vh}
  #modal-img{height:180px}
  #modal-content{padding:18px 20px}
  #modal-footer{padding:14px 20px}
  #modal-title{font-size:18px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-card{padding:14px}
  .stat-icon{width:36px;height:36px;font-size:17px}
  .stat-val{font-size:18px}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Catatan<span>.</span></div>
  </div>
  <div class="sidebar-section">Menu</div>
  <a class="nav-item active" href="index.html">
    <span class="nav-icon">⊞</span> Dashboard
  </a>
  <a class="nav-item" href="admin.html">
    <span class="nav-icon">⚙</span> Admin Panel
  </a>
  <a class="nav-item" href="config.html">
    <span class="nav-icon">🔧</span> Konfigurasi
  </a>
</nav>
<div id="sidebar-overlay"></div>

<!-- WRAPPER -->
<div id="wrapper">
  <div id="topbar">
    <div class="topbar-left">
      <button id="sidebar-toggle">☰</button>
      <div>
        <div class="page-title">Dashboard</div>
        <div class="breadcrumb">Beranda › Semua Artikel</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <span style="color:var(--ink4);font-size:15px">🔍</span>
        <input type="text" id="search-input" placeholder="Cari artikel…">
      </div>
    </div>
  </div>

  <div id="main">
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:#eff6ff;color:var(--primary)">📄</div>
        <div class="stat-info"><div class="stat-val" id="s-total">–</div><div class="stat-label">Total Artikel</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fff7ed;color:var(--accent)">⭐</div>
        <div class="stat-info"><div class="stat-val" id="s-feat">–</div><div class="stat-label">Unggulan</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f0fdf4;color:var(--success)">🏷</div>
        <div class="stat-info"><div class="stat-val" id="s-kat">–</div><div class="stat-label">Kategori</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fefce8;color:var(--warn)">📅</div>
        <div class="stat-info"><div class="stat-val" id="s-last">–</div><div class="stat-label">Terakhir Diupdate</div></div>
      </div>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" data-kat="all">Semua</button>
    </div>

    <div class="section-head">
      <h2 id="section-label">Semua Artikel</h2>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-grid" title="Grid">⊞</button>
        <button class="vt-btn" id="vt-list" title="List">☰</button>
      </div>
    </div>

    <div id="empty-state"><div class="ei">📭</div><p>Belum ada artikel.</p></div>
    <div id="articles-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt="" style="display:none">
      <div id="modal-img-ph" style="display:none">📝</div>
      <button id="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content">
      <div id="modal-meta">
        <span id="modal-kat"></span>
        <span id="modal-date"></span>
        <span id="modal-featured" style="display:none">⭐ Unggulan</span>
      </div>
      <div id="modal-title"></div>
      <div id="modal-desc"></div>
    </div>
    <div id="modal-footer">
      <button id="modal-close-btn" onclick="closeModal()">✕ Tutup</button>
      <button id="modal-copy-btn" onclick="copyDesc()">📋 Copy Deskripsi</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let DB = { kategori:[], artikel:[] };

async function loadData(){
  try {
    const res = await fetch('/api/get-data');
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.message || err.error || 'HTTP '+res.status);
    }
    const data = await res.json();
    DB.kategori = data.kategori || [];
    DB.artikel  = data.artikel  || [];
  } catch(e){
    showToast('Gagal memuat data: '+e.message, true);
  }
  render();
}

let activeKat = 'all';
let searchQ = '';
let viewMode = 'grid';

function getKat(id){ return DB.kategori.find(k=>k.id===id)||{nama:'—',warna:'#9ca3af'} }

function fmtDate(s){
  if(!s) return '';
  return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function render(){
  document.getElementById('s-total').textContent = DB.artikel.length;
  document.getElementById('s-feat').textContent = DB.artikel.filter(a=>a.featured).length;
  document.getElementById('s-kat').textContent = DB.kategori.length;
  const dates = DB.artikel.map(a=>a.tanggal).filter(Boolean).sort().reverse();
  document.getElementById('s-last').textContent = dates[0] ? fmtDate(dates[0]) : '–';

  const fb = document.getElementById('filter-bar');
  fb.innerHTML = '<button class="filter-chip'+(activeKat==='all'?' active':'')+'" data-kat="all">Semua</button>';
  DB.kategori.forEach(k=>{
    fb.innerHTML += `<button class="filter-chip${activeKat===k.id?' active':''}" data-kat="${esc(k.id)}" style="${activeKat===k.id?'background:'+k.warna+';border-color:'+k.warna+';color:#fff':''}">${esc(k.nama)}</button>`;
  });
  fb.querySelectorAll('.filter-chip').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeKat=btn.dataset.kat; render(); });
  });

  let arts = DB.artikel.slice();
  if(activeKat!=='all') arts = arts.filter(a=>a.kategori_id===activeKat);
  if(searchQ) arts = arts.filter(a=>(a.judul+a.deskripsi).toLowerCase().includes(searchQ));

  const kn = activeKat==='all'?'Semua Artikel':(getKat(activeKat).nama||'Kategori');
  document.getElementById('section-label').textContent = kn + ' ('+arts.length+')';

  const grid = document.getElementById('articles-grid');
  const empty = document.getElementById('empty-state');

  if(!arts.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = arts.map((a,i)=>{
    const k = getKat(a.kategori_id);
    const imgHtml = a.gambar
      ? `<img class="a-card-img" src="${esc(a.gambar)}" alt="${esc(a.judul)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const phStyle = a.gambar ? 'display:none' : '';
    return `
    <div class="a-card" style="animation-delay:${i*.06}s" data-id="${esc(a.id)}" onclick="openModal('${esc(a.id)}')">
      ${a.featured?'<div class="featured-ribbon">⭐ Unggulan</div>':''}
      ${imgHtml}
      <div class="a-card-img-ph" style="${phStyle}">📝</div>
      <div class="a-card-body">
        <div class="a-card-meta">
          <span class="kat-badge" style="background:${k.warna}20;color:${k.warna}">${esc(k.nama)}</span>
          <span class="a-date">${fmtDate(a.tanggal)}</span>
        </div>
        <div class="a-card-title">${esc(a.judul)}</div>
        <div class="a-card-desc">${esc(a.deskripsi)}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── MODAL ── */
function openModal(id){
  const a = DB.artikel.find(x=>x.id===id);
  if(!a) return;
  const k = getKat(a.kategori_id);

  const imgEl = document.getElementById('modal-img');
  const phEl  = document.getElementById('modal-img-ph');
  if(a.gambar){
    imgEl.src = a.gambar;
    imgEl.alt = a.judul;
    imgEl.style.display = 'block';
    phEl.style.display  = 'none';
    imgEl.onerror = ()=>{ imgEl.style.display='none'; phEl.style.display='flex'; };
  } else {
    imgEl.style.display = 'none';
    phEl.style.display  = 'flex';
  }

  const katEl = document.getElementById('modal-kat');
  katEl.textContent = k.nama;
  katEl.style.background = k.warna+'20';
  katEl.style.color = k.warna;

  document.getElementById('modal-date').textContent = fmtDate(a.tanggal);

  const featEl = document.getElementById('modal-featured');
  featEl.style.display = a.featured ? 'inline-flex' : 'none';

  document.getElementById('modal-title').textContent = a.judul;
  document.getElementById('modal-desc').textContent  = a.deskripsi || 'Tidak ada deskripsi.';

  // reset tombol copy kalau sebelumnya sudah diklik
  const btn = document.getElementById('modal-copy-btn');
  btn.textContent = '📋 Copy Deskripsi';
  btn.classList.remove('copied');

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function copyDesc(){
  const desc = document.getElementById('modal-desc').textContent;
  navigator.clipboard.writeText(desc).then(()=>{
    const btn = document.getElementById('modal-copy-btn');
    btn.textContent = '✓ Tersalin!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='📋 Copy Deskripsi'; btn.classList.remove('copied'); }, 2000);
  }).catch(()=> showToast('Gagal menyalin teks.', true));
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

/* ── VIEW TOGGLE ── */
document.getElementById('vt-grid').addEventListener('click',()=>{
  viewMode='grid';
  document.getElementById('articles-grid').classList.remove('list-view');
  document.getElementById('vt-grid').classList.add('active');
  document.getElementById('vt-list').classList.remove('active');
});
document.getElementById('vt-list').addEventListener('click',()=>{
  viewMode='list';
  document.getElementById('articles-grid').classList.add('list-view');
  document.getElementById('vt-list').classList.add('active');
  document.getElementById('vt-grid').classList.remove('active');
});

/* ── SEARCH ── */
document.getElementById('search-input').addEventListener('input',e=>{
  searchQ=e.target.value.toLowerCase().trim(); render();
});

/* ── SIDEBAR MOBILE ── */
document.getElementById('sidebar-toggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
});
document.getElementById('sidebar-overlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});

/* ── TOAST ── */
let _tt;
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(err?' err':'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),3000);
}

loadData();
</script>
</body>
