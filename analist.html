<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Academy Eji - Traffic Klik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ================= CSS RESET & VARIABLES ================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
  --accent: #f97316; --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  --sidebar-w: 260px; --header-h: 70px; --radius: 16px; /* Sudut lebih membulat */
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --bg: #f3f4f6; --surface: #ffffff; --surface2: #f8fafc; --border: #e2e8f0;
  --ink: #0f172a; --ink2: #334155; --ink3: #64748b; --ink4: #94a3b8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); 
  --shadow-md: 0 8px 16px -4px rgba(0,0,0,0.05);
  --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.05);
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #334155;
  --ink: #f8fafc; --ink2: #cbd5e1; --ink3: #94a3b8; --ink4: #64748b;
  --primary-light: #1e3a8a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); 
  --shadow-md: 0 8px 16px -4px rgba(0,0,0,0.4);
}
body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; font-size:14px; transition:background 0.3s,color 0.3s; }

/* Custom Scrollbar for better UI */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink3); }

/* ================= SIDEBAR ================= */
#sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:50; transition:transform 0.3s; }
.sidebar-logo { height:var(--header-h); display:flex; align-items:center; gap:12px; padding:0 24px; border-bottom:1px solid var(--border); }
.logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--primary),#60a5fa); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px; flex-shrink:0; box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
.logo-text { font-size:18px; font-weight:700; color:var(--ink); } .logo-text span { color:var(--primary); }
.sidebar-scroll { flex:1; overflow-y:auto; padding-top:10px; }
.sidebar-section { padding:16px 24px 8px; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink4); }
.nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px; cursor:pointer; color:var(--ink2); font-size:14px; font-weight:500; transition:var(--transition); margin:4px 16px; text-decoration:none; }
.nav-item:hover { background:var(--surface2); color:var(--ink); transform:translateX(4px); }
.nav-item.active { background:var(--primary-light); color:var(--primary); font-weight:600; }
.nav-item .nav-icon { font-size:20px; flex-shrink:0; }
.sidebar-footer { padding:20px; border-top:1px solid var(--border); }
.user-profile { display:flex; align-items:center; gap:12px; }
.user-avatar { width:40px; height:40px; border-radius:12px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--primary); }
.user-name { font-size:13px; font-weight:600; color:var(--ink); } .user-role { font-size:11px; color:var(--ink3); }

/* ================= WRAPPER & TOPBAR ================= */
#wrapper { margin-left:var(--sidebar-w); flex:1; min-height:100vh; display:flex; flex-direction:column; width: calc(100% - var(--sidebar-w)); }
#topbar { height:var(--header-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 30px; position:sticky; top:0; z-index:40; }
.page-title { font-size:18px; font-weight:600; color:var(--ink); }
.breadcrumb { font-size:12px; color:var(--ink4); display:flex; align-items:center; gap:6px; margin-top: 2px;}
.topbar-right { display:flex; align-items:center; gap:12px; }
.icon-btn { width:40px; height:40px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--ink2); display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; transition:var(--transition); }
.icon-btn:hover { background:var(--surface2); color:var(--primary); transform: translateY(-2px); }

/* ================= MAIN CONTENT ================= */
#main { padding:30px; flex:1; max-width:1400px; margin:0 auto; width:100%; }

/* ================= STATS CARDS ================= */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:30px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow-sm); transition:var(--transition); }
.stat-card:hover { transform:translateY(-5px); box-shadow:var(--shadow-md); border-color: var(--primary-light); }
.stat-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.stat-val { font-size:26px; font-weight:700; line-height:1.2; color: var(--ink); }
.stat-label { font-size:12px; color:var(--ink3); font-weight:500; margin-top:4px; text-transform: uppercase; letter-spacing: 0.05em; }

/* ================= GRIDS & CARDS ================= */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; }
.card, .card-full { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-sm); transition: var(--transition); }
.card:hover, .card-full:hover { box-shadow: var(--shadow-md); }
.card-full { margin-bottom:24px; }
.card-title { font-size:16px; font-weight:600; color:var(--ink); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.card-title i { font-size:20px; color:var(--surface); background: var(--primary); padding: 6px; border-radius: 8px; }

/* ================= TABLE & LEADERBOARD ================= */
/* Wrapper responsive untuk Android */
.table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
.lb-table { width:100%; border-collapse:collapse; min-width: 600px; /* Mencegah tabel menyusut terlalu kecil di HP */ }
.lb-table th { text-align:left; padding:12px 16px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink4); border-bottom:2px solid var(--border); background: var(--surface2); }
.lb-table td { padding:14px 16px; border-bottom:1px solid var(--border); font-size:13px; color:var(--ink2); vertical-align:middle; transition: var(--transition); }
.lb-table tr:last-child td { border-bottom:none; }
.lb-table tbody tr:hover td { background:var(--surface2); }

/* Badges */
.rank-badge { width:28px; height:28px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
.rank-1 { background:rgba(249,115,22,0.15); color:var(--accent); box-shadow: 0 2px 5px rgba(249,115,22,0.2); }
.rank-2 { background:rgba(100,116,139,0.15); color:var(--ink3); }
.rank-3 { background:rgba(245,158,11,0.15); color:var(--warn); }
.rank-other { background:var(--surface2); color:var(--ink4); font-size:12px; }

/* Progress Bar */
.bar-wrap { display:flex; align-items:center; gap:12px; }
.bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; background:linear-gradient(90deg, var(--primary), #60a5fa); border-radius:4px; transition:width 1s cubic-bezier(0.4, 0, 0.2, 1); }

/* Log Item Dot */
.log-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-right: 8px; box-shadow: 0 0 0 3px var(--primary-light); }

/* ================= UTILITIES ================= */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--ink4); gap:16px; text-align: center; }
.empty-state i { font-size:64px; opacity:0.3; color: var(--primary); }
.empty-
